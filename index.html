<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Arvioflo</title>
  <link rel="icon" type="image/jpeg" href="logo.jpg">
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;1,9..40,300&display=swap" rel="stylesheet" />
  <style>
    *,::before,*::after{box-sizing:border-box;margin:0;padding:0}
    :root{
      --bg:#f5f7fa;--surface:#ffffff;--surface-2:#edf0f5;
      --border:rgba(26,43,94,0.10);--border-hi:rgba(26,43,94,0.18);--border-accent:rgba(26,43,94,0.30);
      --text:#1a2b5e;--text-dim:rgba(26,43,94,0.60);--text-dimmer:rgba(26,43,94,0.35);
      --accent:#1a2b5e;--accent-2:#2a8cb5;
      --accent-glow:rgba(26,43,94,0.08);
      --gradient:linear-gradient(135deg, #1a2b5e 0%, #2a6e9e 100%);
      --radius:8px;
    }
    html{scroll-behavior:smooth}
    body{background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif;min-height:100vh;overflow:hidden}
    @keyframes fadeUp{from{opacity:0;transform:translateY(18px)}to{opacity:1;transform:translateY(0)}}
    @keyframes fadeDot{0%,100%{opacity:0.2}50%{opacity:1}}

    #chat-page{display:flex;height:100dvh;flex-direction:column}
    .chat-header{padding:16px 24px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:12px;background:#ffffff;flex-shrink:0}
    .chat-avatar{width:32px;height:32px;background:var(--accent-glow);border:1px solid var(--border-accent);border-radius:10px;display:flex;align-items:center;justify-content:center;font-family:'Syne',sans-serif;font-size:13px;font-weight:700;color:var(--accent)}
    .chat-name{font-family:'Syne',sans-serif;font-size:15px;font-weight:600}
    .chat-role{font-size:13px;color:var(--text-dim);font-weight:400}

    .chat-messages{flex:1;overflow-y:auto;padding:28px 24px;display:flex;flex-direction:column;gap:16px;scroll-behavior:smooth}
    .chat-messages::-webkit-scrollbar{width:4px}
    .chat-messages::-webkit-scrollbar-track{background:transparent}
    .chat-messages::-webkit-scrollbar-thumb{background:var(--surface-2);border-radius:4px}
    .msg{max-width:620px;width:fit-content;animation:fadeUp .28s ease both}
    .msg.user{align-self:flex-end}
    .msg-bubble{padding:12px 16px;border-radius:16px;font-size:15px;line-height:1.6;color:var(--text);unicode-bidi:plaintext;text-align:start}
    .msg.bot .msg-bubble{background:var(--surface);border:1px solid var(--border);border-bottom-left-radius:4px}
    .msg.user .msg-bubble{background:var(--gradient);color:#ffffff;font-weight:450;border-bottom-right-radius:4px}

    .fade-dots{display:flex;gap:6px;padding:4px 4px}
    .fade-dot{width:7px;height:7px;background:var(--accent);border-radius:50%;animation:fadeDot 1.4s ease-in-out infinite}
    .fade-dot:nth-child(2){animation-delay:0.2s}
    .fade-dot:nth-child(3){animation-delay:0.4s}
    .slow-note{font-size:12px;color:var(--text-dimmer);font-style:italic;margin-top:6px;animation:fadeUp .3s ease both}

    .chat-input-area{padding:18px 24px;border-top:1px solid var(--border);background:#ffffff;flex-shrink:0}
    .input-row{display:flex;gap:10px;align-items:center;background:var(--bg);border:1px solid var(--border);border-radius:16px;padding:14px 16px;transition:border-color .2s}
    .input-row:hover{border-color:var(--border-accent)}
    .input-row:focus-within{border-color:var(--border-accent)}
    #chat-input{flex:1;background:transparent;border:none;outline:none;color:var(--text);font-family:'DM Sans',sans-serif;font-size:16px;resize:none;max-height:120px;line-height:1.55}
    #chat-input::placeholder{color:var(--text-dimmer)}
    .send-btn{width:36px;height:36px;background:var(--gradient);border:none;border-radius:10px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .18s;flex-shrink:0}
    .send-btn:hover{opacity:0.8}
    .send-btn:active{transform:translateY(0)}
    .send-btn:disabled{opacity:0.3;cursor:default;transform:none}
    .send-btn svg{width:15px;height:15px;stroke:#ffffff;stroke-width:2.5}

    @media(max-width:768px){
      .chat-messages{padding:18px 14px;padding-bottom:100px}
      .chat-input-area{padding:12px 14px;position:fixed;bottom:0;left:0;right:0;z-index:100}
    }
  </style>
</head>
<body>

<div id="chat-page">
  <div class="chat-header">
    <div class="chat-avatar">A</div>
    <div>
      <span class="chat-name">Arvio</span>
      <span class="chat-role"> — AI Assistant</span>
    </div>
  </div>
  <div class="chat-messages" id="chat-messages"></div>
  <div class="chat-input-area">
    <div class="input-row">
      <textarea id="chat-input" placeholder="How can I help you today?" rows="1"></textarea>
      <button class="send-btn" onclick="sendMessage()">
        <svg viewBox="0 0 24 24" fill="none" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="19" x2="12" y2="5"/><polyline points="5 12 12 5 19 12"/></svg>
      </button>
    </div>
  </div>
</div>

<script>
  const sessionId = crypto.randomUUID();
  setTimeout(() => addBotMessage("Hi! I'm Arvio, your AI assistant. How can I help you today?"), 300);

  function addBotMessage(text, imageUrl) {
    const c = document.getElementById('chat-messages');
    const m = document.createElement('div');
    m.className = 'msg bot';
    const imgTag = imageUrl ? `<img src="${imageUrl}" style="max-width:100%;border-radius:8px;margin-top:8px;" />` : '';
    m.innerHTML = `<div class="msg-bubble">${linkify(text)}${imgTag}</div>`;
    c.appendChild(m);
    c.scrollTop = c.scrollHeight;
  }

  function addUserMessage(text) {
    const c = document.getElementById('chat-messages');
    const m = document.createElement('div');
    m.className = 'msg user';
    m.innerHTML = `<div class="msg-bubble">${escapeHTML(text)}</div>`;
    c.appendChild(m);
    c.scrollTop = c.scrollHeight;
  }

  function showTyping() {
    const c = document.getElementById('chat-messages');
    const t = document.createElement('div');
    t.id = 'typing';
    t.className = 'msg bot';
    t.innerHTML = `<div class="msg-bubble"><div class="fade-dots"><div class="fade-dot"></div><div class="fade-dot"></div><div class="fade-dot"></div></div></div>`;
    c.appendChild(t);
    c.scrollTop = c.scrollHeight;
  }

  function removeTyping() {
    const t = document.getElementById('typing');
    if (t) t.remove();
  }

  function sendMessage() {
    const chatInput = document.getElementById('chat-input');
    const text = chatInput.value.trim();
    if (!text) return;
    chatInput.value = '';
    chatInput.style.height = 'auto';
    addUserMessage(text);
    document.querySelector('.send-btn').disabled = true;
    showTyping();
    const timeout = setTimeout(() => {
      const t = document.getElementById('typing');
      if (t && !t.querySelector('.slow-note')) {
        const note = document.createElement('div');
        note.className = 'slow-note';
        note.textContent = 'Still thinking...';
        t.querySelector('.msg-bubble').appendChild(note);
      }
    }, 10000);

    fetch('https://api.arvioflo.com/chat', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'x-api-key': 'a7c9e2f4b1d835609c4a12de7f08b3c6e519ad42f0c87b6e3d25a1f94c067e82' },
      body: JSON.stringify({ message: text, session_id: sessionId })
    })
    .then(r => { if (!r.ok) throw new Error(r.status); return r.json(); })
    .then(data => { clearTimeout(timeout); removeTyping(); addBotMessage(data.reply, data.image_url); document.querySelector('.send-btn').disabled = false; })
    .catch(() => { clearTimeout(timeout); removeTyping(); addBotMessage("Sorry, I'm having trouble connecting right now. Please try again."); document.querySelector('.send-btn').disabled = false; });
  }

  const chatInput = document.getElementById('chat-input');
  chatInput.addEventListener('keydown', e => { if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); } });
  document.addEventListener('keydown', e => { if (!e.ctrlKey && !e.metaKey && !e.altKey && e.key.length === 1 && document.activeElement !== chatInput) { chatInput.focus(); } });
  chatInput.addEventListener('input', () => { chatInput.style.height = 'auto'; chatInput.style.height = Math.min(chatInput.scrollHeight, 120) + 'px'; });

  function linkify(text) {
    text = text.replace(/Image:\s*/gi, '');
    const urlPattern = /(https?:\/\/[^\s]+)/g;
    return text.replace(urlPattern, function(url) {
      if (url.match(/\.(png|jpg|jpeg|gif|webp)$/i)) {
        return '<img src="' + url + '" style="max-width:100%;border-radius:8px;margin-top:8px;display:block;" />';
      }
      return '<a href="' + url + '" target="_blank" rel="noopener noreferrer" style="color:var(--accent);text-decoration:underline;">' + url + '</a>';
    });
  }

  function escapeHTML(str) {
    return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }
</script>
</body>
</html>
